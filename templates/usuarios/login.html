{% load crispy_forms_tags %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login — ERP</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" rel="stylesheet">
    <style>
        :root {
            --green-primary: #22c55e;
            --green-dark: #16a34a;
            --green-dim: #22c55e18;
            --green-border: #22c55e30;
            --bg-base: #111111;
            --bg-card: #1a1a1a;
            --border: #2a2a2a;
            --text-primary: #e5e5e5;
            --text-secondary: #888888;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg-base);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }

        .login-wrap {
            display: flex;
            width: 100%;
            max-width: 820px;
            min-height: 480px;
            border-radius: 12px;
            overflow: hidden;
            border: 0.5px solid var(--border);
        }

        .login-brand {
            width: 340px;
            background: #0d0d0d;
            border-right: 0.5px solid var(--border);
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            justify-content: center;
            padding: 2.5rem;
            flex-shrink: 0;
        }

        .brand-icon {
            width: 48px; height: 48px;
            background: var(--green-dim);
            border: 0.5px solid var(--green-border);
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            margin-bottom: 1.5rem;
        }

        .brand-icon i { color: var(--green-primary); font-size: 24px; }
        .brand-title { color: var(--text-primary); font-size: 22px; font-weight: 600; margin-bottom: 0.5rem; }
        .brand-sub { color: var(--text-secondary); font-size: 13px; line-height: 1.6; }

        .brand-divider {
            width: 32px; height: 2px;
            background: var(--green-primary);
            border-radius: 99px;
            margin: 1.5rem 0;
        }

        .brand-info {
            display: flex; align-items: center; gap: 8px;
            color: var(--text-secondary); font-size: 12px; margin-bottom: 8px;
        }
        .brand-info i { color: var(--green-primary); font-size: 14px; }

        .login-form {
            flex: 1;
            background: var(--bg-card);
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 2.5rem;
        }

        .form-title { font-size: 16px; font-weight: 500; color: var(--text-primary); margin-bottom: 0.25rem; }
        .form-subtitle { font-size: 12px; color: var(--text-secondary); margin-bottom: 2rem; }

        .form-label { font-size: 12px; color: var(--text-secondary) !important; margin-bottom: 0.3rem; }

        .form-control {
            background: var(--bg-base) !important;
            border: 0.5px solid var(--border) !important;
            color: var(--text-primary) !important;
            font-size: 13px;
            border-radius: 6px;
        }

        .form-control:focus {
            border-color: var(--green-primary) !important;
            box-shadow: 0 0 0 3px var(--green-dim) !important;
        }

        .form-control::placeholder { color: var(--text-secondary); opacity: 0.5; }

        .btn.btn-primary {
            width: 100%;
            background: var(--green-primary) !important;
            color: #000 !important;
            font-size: 13px;
            font-weight: 600;
            border: none !important;
            border-radius: 6px;
            padding: 0.65rem;
            margin-top: 0.5rem;
            transition: background 0.15s;
        }

        .btn.btn-primary:hover { background: var(--green-dark) !important; color: #fff !important; }

        .errorlist {
            list-style: none;
            background: #ef444415;
            border: 0.5px solid #ef444430;
            color: #ef4444;
            border-radius: 6px;
            font-size: 12px;
            padding: 0.6rem 0.85rem;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>
    <div class="login-wrap">

        <div class="login-brand">
            <div class="brand-icon">
                <i class="ti ti-plant-2"></i>
            </div>
            <div class="brand-title">ERP</div>
            <div class="brand-sub">Sistema de gestão integrada para sua empresa.</div>
            <div class="brand-divider"></div>
            <div class="brand-info"><i class="ti ti-check"></i> Controle de vendas</div>
            <div class="brand-info"><i class="ti ti-check"></i> Gestão de estoque</div>
            <div class="brand-info"><i class="ti ti-check"></i> Relatórios em tempo real</div>
        </div>

        <div class="login-form">
            <div class="form-title">Bem-vindo de volta</div>
            <div class="form-subtitle">Faça login para continuar</div>

            <form method="post">
                {% csrf_token %}
                {% crispy form %}
            </form>
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
