<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login — ERP</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" rel="stylesheet">
    <style>
        :root {
            --green-primary: #22c55e;
            --green-dark: #16a34a;
            --green-dim: #22c55e18;
            --green-border: #22c55e30;
            --bg-base: #111111;
            --bg-card: #1a1a1a;
            --border: #2a2a2a;
            --text-primary: #e5e5e5;
            --text-secondary: #888888;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg-base);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }

        .login-wrap {
            display: flex;
            width: 100%;
            max-width: 820px;
            min-height: 480px;
            border-radius: 12px;
            overflow: hidden;
            border: 0.5px solid var(--border);
        }

        /* Painel esquerdo */
        .login-brand {
            width: 340px;
            background: #0d0d0d;
            border-right: 0.5px solid var(--border);
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            justify-content: center;
            padding: 2.5rem;
            flex-shrink: 0;
        }

        .brand-icon {
            width: 48px;
            height: 48px;
            background: var(--green-dim);
            border: 0.5px solid var(--green-border);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 1.5rem;
        }

        .brand-icon i { color: var(--green-primary); font-size: 24px; }

        .brand-title {
            color: var(--text-primary);
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .brand-sub {
            color: var(--text-secondary);
            font-size: 13px;
            line-height: 1.6;
        }

        .brand-divider {
            width: 32px;
            height: 2px;
            background: var(--green-primary);
            border-radius: 99px;
            margin: 1.5rem 0;
        }

        .brand-info {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-secondary);
            font-size: 12px;
            margin-bottom: 8px;
        }

        .brand-info i { color: var(--green-primary); font-size: 14px; }

        /* Painel direito — formulário */
        .login-form {
            flex: 1;
            background: var(--bg-card);
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 2.5rem;
        }

        .form-title {
            font-size: 16px;
            font-weight: 500;
            color: var(--text-primary);
            margin-bottom: 0.25rem;
        }

        .form-subtitle {
            font-size: 12px;
            color: var(--text-secondary);
            margin-bottom: 2rem;
        }

        .form-label {
            font-size: 12px;
            color: var(--text-secondary);
            margin-bottom: 0.3rem;
            display: block;
        }

        .form-control {
            background: var(--bg-base);
            border: 0.5px solid var(--border);
            color: var(--text-primary);
            font-size: 13px;
            border-radius: 6px;
            padding: 0.6rem 0.85rem;
            width: 100%;
            outline: none;
            transition: border-color 0.15s, box-shadow 0.15s;
        }

        .form-control:focus {
            border-color: var(--green-primary);
            box-shadow: 0 0 0 3px var(--green-dim);
        }

        .form-control::placeholder { color: var(--text-secondary); opacity: 0.5; }

        .input-wrap {
            position: relative;
            margin-bottom: 1rem;
        }

        .input-icon {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
            font-size: 15px;
            pointer-events: none;
        }

        .input-wrap .form-control { padding-right: 2rem; }

        .btn-login {
            width: 100%;
            background: var(--green-primary);
            color: #000;
            font-size: 13px;
            font-weight: 600;
            border: none;
            border-radius: 6px;
            padding: 0.65rem;
            cursor: pointer;
            margin-top: 0.5rem;
            transition: background 0.15s;
        }

        .btn-login:hover { background: var(--green-dark); color: #fff; }

        .erro-msg {
            background: #ef444415;
            border: 0.5px solid #ef444430;
            color: #ef4444;
            border-radius: 6px;
            font-size: 12px;
            padding: 0.6rem 0.85rem;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 6px;
        }
    </style>
</head>
<body>
    <div class="login-wrap">

        <!-- Marca -->
        <div class="login-brand">
            <div class="brand-icon">
                <i class="ti ti-plant-2"></i>
            </div>
            <div class="brand-title">ERP</div>
            <div class="brand-sub">Sistema de gestão integrada para sua empresa.</div>
            <div class="brand-divider"></div>
            <div class="brand-info"><i class="ti ti-check"></i> Controle de vendas</div>
            <div class="brand-info"><i class="ti ti-check"></i> Gestão de estoque</div>
            <div class="brand-info"><i class="ti ti-check"></i> Relatórios em tempo real</div>
        </div>

        <!-- Formulário -->
        <div class="login-form">
            <div class="form-title">Bem-vindo de volta</div>
            <div class="form-subtitle">Faça login para continuar</div>

            {% if erro %}
                <div class="erro-msg">
                    <i class="ti ti-alert-circle"></i> {{ erro }}
                </div>
            {% endif %}

            <form method="post">
                {% csrf_token %}

                <label class="form-label">Usuário</label>
                <div class="input-wrap">
                    <input type="text" name="username" class="form-control" placeholder="seu usuário" autofocus required>
                    <i class="ti ti-user input-icon"></i>
                </div>

                <label class="form-label">Senha</label>
                <div class="input-wrap">
                    <input type="password" name="password" class="form-control" placeholder="••••••••" required>
                    <i class="ti ti-lock input-icon"></i>
                </div>

                <button type="submit" class="btn-login">Entrar</button>
            </form>
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
