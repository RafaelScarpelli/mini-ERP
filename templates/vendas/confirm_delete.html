{% extends 'base.html' %}

{% block title %}{{ titulo }} — ERP{% endblock %}
{% block topbar_title %}{{ titulo }}{% endblock %}

{% block content %}
<div class="page-header">
    <h1>{{ titulo }}</h1>
</div>

<div class="card-dark" style="max-width: 480px;">
    <div class="card-body">
        <p style="color:var(--text-secondary); font-size:14px; margin-bottom:1.5rem;">
            Tem certeza que deseja excluir <strong style="color:var(--text-primary);">{{ objeto }}</strong>?
            Esta ação não pode ser desfeita.
        </p>
        <form method="post" class="d-flex gap-2">
            {% csrf_token %}
            <button type="submit" class="btn btn-sm" style="background:#ef444415; color:#ef4444; border:0.5px solid #ef444430; border-radius:6px; padding:0.45rem 1rem; font-size:13px;">
                <i class="ti ti-trash me-1"></i> Confirmar exclusão
            </button>
            <a href="javascript:history.back()" class="btn-outline-green">
                Cancelar
            </a>
        </form>
    </div>
</div>
{% endblock %}
